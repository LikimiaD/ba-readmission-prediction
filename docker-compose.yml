services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: readmission-dashboard:latest
    container_name: readmission-dashboard
    env_file:
      - .env.docker
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed
      - ./reports:/app/reports:ro
    expose:
      - "8050"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8050/', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: readmission-nginx
    depends_on:
      - dashboard
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: readmission-pipeline:latest
    container_name: readmission-pipeline
    profiles:
      - tools
    env_file:
      - .env.docker
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
